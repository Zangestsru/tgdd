<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.id != null ? 'Chỉnh sửa sản phẩm' : 'Thêm sản phẩm mới'}">Form sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .navbar {
            background: rgba(255, 255, 255, 0.95) !important;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #5a6fd6 0%, #6a4190 100%);
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="/"><i class="bi bi-shop"></i> WebBanHang</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" th:href="@{/products}"><i class="bi bi-box-seam"></i> Sản phẩm</a>
                <a class="nav-link" th:href="@{/categories}"><i class="bi bi-tags"></i> Danh mục</a>
                <a class="nav-link" th:href="@{/orders}"><i class="bi bi-cart3"></i> Đơn hàng</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card">
                    <div class="card-header bg-white border-0 pt-4">
                        <h4 class="mb-0 text-center">
                            <i class="bi bi-box-seam text-primary"></i>
                            <span th:text="${product.id != null ? 'Chỉnh sửa sản phẩm' : 'Thêm sản phẩm mới'}"></span>
                        </h4>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/products/save}" th:object="${product}" method="post"
                            enctype="multipart/form-data">
                            <input type="hidden" th:field="*{id}">

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Tên sản phẩm</label>
                                <input type="text" class="form-control" th:field="*{name}"
                                    placeholder="Nhập tên sản phẩm" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Giá (VNĐ)</label>
                                <input type="number" class="form-control" th:field="*{price}" placeholder="Nhập giá"
                                    step="1000" min="0" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Mô tả</label>
                                <textarea class="form-control" th:field="*{description}" rows="3"
                                    placeholder="Nhập mô tả sản phẩm"></textarea>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Hình ảnh</label>
                                <input type="file" class="form-control" name="imageFile" accept="image/*" id="imageFile"
                                    onchange="previewUploadedImage()">
                                <small class="text-muted">Chọn file ảnh từ máy tính (JPG, PNG, GIF...)</small>

                                <!-- Hiển thị ảnh hiện tại nếu đang edit -->
                                <div th:if="${product.image != null and !product.image.isEmpty()}" class="mt-2">
                                    <p class="text-muted small mb-1">Ảnh hiện tại:</p>
                                    <img th:src="${product.image}" alt="Current" class="img-thumbnail"
                                        style="max-height: 150px;">
                                </div>

                                <!-- Preview ảnh mới được chọn -->
                                <div class="mt-2" id="imagePreview" style="display: none;">
                                    <p class="text-muted small mb-1">Ảnh mới:</p>
                                    <img id="previewImg" src="" alt="Preview" class="img-thumbnail"
                                        style="max-height: 150px;">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">Danh mục</label>
                                <select class="form-select" name="categoryId">
                                    <option value="">-- Chọn danh mục --</option>
                                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                                        th:selected="${product.category != null and product.category.id == cat.id}">
                                    </option>
                                </select>
                            </div>

                            <div class="mb-4 form-check ps-4">
                                <input type="checkbox" class="form-check-input" th:field="*{promotion}" id="promotion">
                                <label class="form-check-label fw-bold text-danger" for="promotion">
                                    <i class="bi bi-fire"></i> Khuyến mãi Online (Hiện ở mục Flash Sale)
                                </label>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="bi bi-check-circle"></i> Lưu sản phẩm
                                </button>
                                <a th:href="@{/products}" class="btn btn-outline-secondary">
                                    <i class="bi bi-arrow-left"></i> Quay lại
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function previewUploadedImage() {
            var fileInput = document.getElementById('imageFile');
            var preview = document.getElementById('imagePreview');
            var img = document.getElementById('previewImg');

            if (fileInput.files && fileInput.files[0]) {
                var reader = new FileReader();
                reader.onload = function (e) {
                    img.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                preview.style.display = 'none';
            }
        }
    </script>
</body>

</html>
