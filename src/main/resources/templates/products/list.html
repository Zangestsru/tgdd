<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .table { margin-bottom: 0; }
        .btn-action { padding: 0.25rem 0.5rem; margin: 0 2px; }
        .navbar { background: rgba(255,255,255,0.95) !important; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
        .page-title { color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="/"><i class="bi bi-shop"></i> WebBanHang</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" th:href="@{/products}"><i class="bi bi-box-seam"></i> Sản phẩm</a>
                <a class="nav-link" th:href="@{/categories}"><i class="bi bi-tags"></i> Danh mục</a>
                <a class="nav-link" th:href="@{/orders}"><i class="bi bi-cart3"></i> Đơn hàng</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="page-title mb-0"><i class="bi bi-box-seam"></i> Danh sách sản phẩm</h2>
            <a th:href="@{/products/new}" class="btn btn-light btn-lg">
                <i class="bi bi-plus-circle"></i> Thêm sản phẩm
            </a>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Hình ảnh</th>
                            <th>Tên sản phẩm</th>
                            <th>Giá</th>
                            <th>Mô tả</th>
                            <th>Danh mục</th>
                            <th class="text-center">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${products}">
                            <td th:text="${product.id}"></td>
                            <td>
                                <img th:if="${product.image != null and !product.image.isEmpty()}" 
                                     th:src="${product.image}" 
                                     alt="Product" 
                                     style="max-width: 60px; max-height: 60px; object-fit: cover; border-radius: 8px;">
                                <span th:unless="${product.image != null and !product.image.isEmpty()}" class="text-muted">-</span>
                            </td>
                            <td th:text="${product.name}"></td>
                            <td th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                            <td th:text="${product.description}"></td>
                            <td th:text="${product.category != null ? product.category.name : 'Chưa phân loại'}"></td>
                            <td class="text-center">
                                <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-warning btn-action">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/products/delete/{id}(id=${product.id})}" class="btn btn-danger btn-action"
                                   onclick="return confirm('Bạn có chắc muốn xóa sản phẩm này?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(products)}">
                            <td colspan="7" class="text-center text-muted py-4">
                                <i class="bi bi-inbox fs-1"></i>
                                <p class="mt-2">Chưa có sản phẩm nào</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
