<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Quản Lý danh mục </title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #f9f9f9;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-link {
            text-decoration: none;
            padding: 8px 15px;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
        }

        .form-container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button.btn-primary {
            padding: 10px 20px;
            background-color: #28a745;
            border: none;
            cursor: pointer;
            color: white;
            font-weight: bold;
            border-radius: 4px;
        }

        button.btn-primary:hover {
            background-color: #218838;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        .btn-danger {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
        }

        .btn-warning {
            background-color: #ffc107;
            color: black;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
            margin-right: 5px;
        }

        .success {
            color: green;
            display: none;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="header-actions">
        <h1>Quản Lý danh mục Sản Phẩm</h1>
        <a href="/admin" class="btn-link">Trở về Quản Lý Sản Phẩm</a>
    </div>

    <div class="form-container">
        <h2 id="formTitle">Thêm danh mục mới</h2>
        <form id="categoryForm">
            <input type="hidden" id="catId">
            <div class="form-group">
                <label>Nhóm danh mục (Để trống nếu tạo danh mục chính):</label>
                <input type="text" id="parentName" placeholder="Nhập nhóm danh mục ...">
            </div>

            <div class="form-group">
                <label>Tên danh mục (Chính hoặc Con):</label>
                <input type="text" id="name" required placeholder="Nhập tên danh mục ...">
            </div>

            <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="showInAccessories" style="width: auto; margin:0;"
                    onchange="document.getElementById('imageFormGroup').style.display = this.checked ? 'block' : 'none';">
                <label for="showInAccessories" style="margin-bottom: 0;">Hiển thị ở mục Phụ kiện (hiển thị trên trang
                    chủ)</label>
            </div>

            <div class="form-group" id="imageFormGroup" style="display: none; margin-top: 15px;">
                <label>Hình ảnh danh mục (hiển thị trên trang chủ nếu chọn):</label>
                <input type="file" id="imageInput" accept="image/*" style="border:none; padding:0;">
                <div style="margin-top: 10px;">
                    <img id="imagePreview" src=""
                        style="width: 50px; height: 50px; object-fit: cover; display: none; border: 1px solid #ddd; padding: 2px;">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="btn-primary">Thêm danh mục </button>
            <button type="button" id="cancelBtn" class="btn-warning" style="display:none;"
                onclick="resetForm()">Hủy</button>
            <div id="successMsg" class="success">Thao tác thành công!</div>
        </form>
    </div>

    <h2>Danh sách các loại danh mục </h2>
    <table id="categoryTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nhóm danh mục </th>
                <th>Tên danh mục </th>
                <th width="150">Hành động</th>
            </tr>
        </thead>
        <tbody>
            <!-- Data will be here -->
        </tbody>
    </table>

    <script th:src="@{/js/categories.js}"></script>
    <script>
        let isEditing = false;

        async function renderTable() {
            const categories = await getCategories();
            const tbody = document.querySelector('#categoryTable tbody');
            tbody.innerHTML = '';

            // Group by parent hierarchically
            const groups = {};
            categories.forEach(c => {
                const parentName = c.parent || c.name;
                if (!groups[parentName]) {
                    groups[parentName] = { main: null, children: [] };
                }
                if (!c.parent) {
                    groups[parentName].main = c;
                } else {
                    groups[parentName].children.push(c);
                }
            });

            // Flatten into sorted array: Parent followed by its children
            const sortedCategories = [];
            const sortedGroupNames = Object.keys(groups).sort((a, b) => a.localeCompare(b));

            sortedGroupNames.forEach(gn => {
                const group = groups[gn];
                if (group.main) sortedCategories.push(group.main);

                // Sort children by name
                group.children.sort((a, b) => a.name.localeCompare(b.name));
                sortedCategories.push(...group.children);
            });

            sortedCategories.forEach(c => {
                const isMain = !c.parent;
                const tr = document.createElement('tr');
                if (!isMain) {
                    tr.style.backgroundColor = '#fafafa';
                }
                tr.innerHTML = `
                    <td>${c.id}</td>
                    <td><strong>${c.parent || '<em style="color:#999">Danh mục chính</em>'}</strong></td>
                    <td style="${isMain ? 'font-weight:bold;' : 'padding-left: 20px;'}">
                        ${isMain ? '' : '— '} ${c.name} <br> 
                        <small style="color:gray">${c.showInAccessories ? '(Có ở Phụ kiện)' : ''}</small>
                        ${c.image ? `<br><img src="${c.image}" style="width:30px;height:30px;object-fit:cover;border-radius:4px;margin-top:4px;border:1px solid #ccc;">` : ''}
                    </td>
                    <td>
                        <button class="btn-warning" onclick="editCategory(${c.id}, '${(c.parent || '').replace(/'/g, "\\'")}'  , '${c.name.replace(/'/g, "\\'")}'  , ${c.showInAccessories ? 'true' : 'false'}, '${c.image ? c.image : ''}')">Sửa</button>
                        <button class="btn-danger" onclick="removeCategory(${c.id})">Xóa</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function removeCategory(id) {
            if (confirm('Bạn có chắc muốn xóa danh mục  này?')) {
                await deleteCategory(id);
                renderTable();
            }
        }

        // Handle image selection preview
        document.getElementById('imageInput').addEventListener('change', function (e) {
            const file = e.target.files[0];
            const preview = document.getElementById('imagePreview');

            if (file) {
                const reader = new FileReader();
                reader.onload = function (event) {
                    preview.src = event.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            } else {
                preview.src = '';
                preview.style.display = 'none';
            }
        });

        function editCategory(id, parent, name, showInAccessories, imageBase64) {
            isEditing = true;
            document.getElementById('formTitle').innerText = "Cập nhật danh mục ";
            document.getElementById('submitBtn').innerText = "Cập nhật";
            document.getElementById('cancelBtn').style.display = "inline-block";

            document.getElementById('catId').value = id;
            document.getElementById('parentName').value = parent;
            document.getElementById('name').value = name;
            document.getElementById('showInAccessories').checked = showInAccessories;

            const imageFormGroup = document.getElementById('imageFormGroup');
            const preview = document.getElementById('imagePreview');

            imageFormGroup.style.display = showInAccessories ? 'block' : 'none';
            // Clear input so it doesn't upload old file if un-edited
            document.getElementById('imageInput').value = '';
            if (imageBase64) {
                preview.src = imageBase64;
                preview.style.display = 'block';
            } else {
                preview.src = '';
                preview.style.display = 'none';
            }

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            isEditing = false;
            document.getElementById('formTitle').innerText = "Thêm danh mục  mới";
            document.getElementById('submitBtn').innerText = "Thêm danh mục ";
            document.getElementById('cancelBtn').style.display = "none";
            document.getElementById('categoryForm').reset();
            document.getElementById('catId').value = "";
            document.getElementById('showInAccessories').checked = false;
            document.getElementById('imageFormGroup').style.display = 'none';
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('imagePreview').src = '';
        }

        document.getElementById('categoryForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerText;
            submitBtn.disabled = true;
            submitBtn.innerText = 'Đang lưu...';

            try {
                const parent = document.getElementById('parentName').value.trim();
                const name = document.getElementById('name').value.trim();
                const id = document.getElementById('catId').value;
                const showInAccessories = document.getElementById('showInAccessories').checked;

                // Handle image upload
                const fileInput = document.getElementById('imageInput');
                const file = fileInput.files[0];
                let imageUrl = '';

                if (file && showInAccessories) {
                    const formData = new FormData();
                    formData.append('file', file);
                    const uploadRes = await fetch('/api/products/upload-image', {
                        method: 'POST',
                        body: formData
                    });
                    if (!uploadRes.ok) {
                        throw new Error('Upload ảnh thất bại');
                    }
                    const uploadData = await uploadRes.json();
                    imageUrl = uploadData.url;
                } else if (isEditing) {
                    // if editing and no new file, preserve existing image shown in preview
                    const preview = document.getElementById('imagePreview');
                    if (preview.src && preview.src.startsWith('http')) {
                        // it's a previously saved URL
                        const urlObj = new URL(preview.src);
                        imageUrl = urlObj.pathname;
                    } else if (preview.src && preview.src.startsWith('data:')) {
                        // shouldn't normally happen since we cleared it, but just in case
                    } else if (document.getElementById('imagePreview').style.display !== 'none') {
                        // Extract relative path from preview img if possible
                        imageUrl = preview.getAttribute('src');
                    }
                }

                const payload = { parent: parent, name: name, showInAccessories: showInAccessories, image: imageUrl };

                if (isEditing) {
                    await updateCategory(id, payload);
                } else {
                    await addCategory(payload);
                }

                // Show success
                const msg = document.getElementById('successMsg');
                msg.style.display = 'block';
                setTimeout(() => msg.style.display = 'none', 3000);

                resetForm();
                renderTable();
            } catch (err) {
                alert('Có lỗi xảy ra: ' + err.message);
                console.error(err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = originalText;
            }
        });



        // Initial render
        renderTable();
    </script>
</body>

</html>
