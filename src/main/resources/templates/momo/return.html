<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kết quả thanh toán MoMo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header text-center">
                    <h3>Kết quả giao dịch MoMo</h3>
                </div>
                <div class="card-body">
                    <div class="alert alert-info text-center" role="alert" th:text="${message}"></div>

                    <p><strong>Mã đơn hàng:</strong> <span th:text="${orderId}"></span></p>
                    <p><strong>Số tiền:</strong> <span th:text="${amount}"></span> VNĐ</p>
                    <p><strong>Thông tin:</strong> <span th:text="${orderInfo}"></span></p>

                    <div class="text-center mt-4">
                        <a href="/orders" class="btn btn-primary">Quay lại danh sách đơn hàng</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
