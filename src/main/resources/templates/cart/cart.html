<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng của bạn | Thegioididong.com</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-orange: #f37021;
            --primary-blue: #288ad6;
            --bg-gray: #f0f0f0;
            --text-main: #333;
            --text-secondary: #666;
            --border-color: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-gray);
            color: var(--text-main);
            padding-bottom: 120px;
            /* Space for fixed bottom bar */
        }

        .header-top {
            background-color: #ffd400;
            height: 4px;
            width: 100%;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
        }

        .top-nav {
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .top-nav a {
            text-decoration: none;
            color: var(--text-main);
            font-size: 18px;
        }

        /* Delivery Tabs */
        .delivery-tabs {
            display: flex;
            background: #fff;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            font-weight: 500;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            color: var(--text-secondary);
        }

        .tab.active {
            color: var(--primary-blue);
            border-bottom: 2px solid var(--primary-blue);
            background-color: #f9f9f9;
        }

        .tab i {
            margin-right: 8px;
        }

        /* Customer Info */
        .section-box {
            padding: 15px;
            border-bottom: 8px solid var(--bg-gray);
        }

        .customer-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
        }

        .customer-info .title {
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
        }

        .customer-info .sub-title {
            color: var(--primary-orange);
            font-size: 13px;
        }

        /* Product List */
        .product-item {
            display: flex;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .product-item:last-child {
            border-bottom: none;
        }

        .product-img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-right: 15px;
        }

        .product-detail {
            flex: 1;
        }

        .product-name {
            font-size: 14px;
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 8px;
            padding-right: 80px;
            /* Avoid price overlap */
        }

        .product-variant {
            display: inline-block;
            background: #f1f1f1;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .price-group {
            position: absolute;
            right: 0;
            top: 20px;
            text-align: right;
        }

        .price-current {
            color: #d0021b;
            font-weight: bold;
            display: block;
            font-size: 15px;
        }

        .price-old {
            text-decoration: line-through;
            color: #999;
            font-size: 12px;
            margin-top: 2px;
            display: block;
        }

        .promo-tag {
            background: #f6f6f6;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            color: #555;
            line-height: 1.4;
            margin-top: 10px;
        }

        .promo-tag a {
            color: var(--primary-blue);
            text-decoration: none;
        }

        .cart-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 15px;
        }

        .btn-remove {
            color: var(--text-secondary);
            font-size: 13px;
            margin-right: 20px;
            cursor: pointer;
        }

        .quantity-control {
            display: flex;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            overflow: hidden;
        }

        .quantity-control button {
            width: 32px;
            height: 32px;
            background: #fff;
            border: none;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quantity-control span {
            width: 45px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            font-size: 15px;
            font-weight: 500;
        }

        /* Labels and Options */
        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .option-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            font-size: 14px;
        }

        .option-item input[type="checkbox"],
        .option-item input[type="radio"] {
            margin-right: 12px;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .payment-item {
            display: flex;
            align-items: flex-start;
            padding: 15px 0;
            border-bottom: 1px solid #f9f9f9;
        }

        .payment-info {
            flex: 1;
        }

        .payment-info label {
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .payment-info p {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 5px;
            padding-left: 0;
        }

        /* Summary Area */
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 15px;
        }

        .total-row {
            font-weight: bold;
            font-size: 17px;
            padding-top: 15px;
            margin-top: 10px;
            border-top: 1px solid #eee;
        }

        /* Bottom Fixed Bar */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 600px;
            background: #fff;
            padding: 15px;
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(180deg, #f7941e 0%, #f37021 100%);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(243, 112, 33, 0.2);
        }

        .empty-cart {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-cart i {
            font-size: 100px;
            color: #e0e0e0;
            margin-bottom: 25px;
        }

        .empty-cart h2 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .empty-cart p {
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .btn-home {
            display: inline-block;
            padding: 12px 40px;
            border: 1px solid var(--primary-blue);
            color: var(--primary-blue);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
        }

        /* Custom Switch CSS */
        .switch-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--primary-blue);
        }

        input:checked+.slider:before {
            transform: translateX(20px);
        }
    </style>
</head>

<body>

    <div class="header-top"></div>

    <div class="container">
        <!-- Back Button -->
        <div class="top-nav">
            <a href="/"><i class="fa-solid fa-chevron-left"></i> Quay lại</a>
        </div>

        <div id="cart-content">
            <!-- Content will be rendered by JS -->
        </div>
    </div>

    <script>
        const CART_KEY = 'tgdd_cart';

        function getCart() {
            return JSON.parse(localStorage.getItem(CART_KEY) || '[]');
        }

        function saveCart(cart) {
            localStorage.setItem(CART_KEY, JSON.stringify(cart));
            renderCart();
        }

        function formatCurrency(amount) {
            if (!amount) return "0₫";
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
        }

        function updateQuantity(id, delta) {
            let cart = getCart();
            let item = cart.find(i => i.id == id);
            if (item) {
                item.quantity = Math.max(1, item.quantity + delta);
                saveCart(cart);
            }
        }

        function removeItem(id) {
            if (confirm('Bạn có muốn xóa sản phẩm này khỏi giỏ hàng?')) {
                let cart = getCart().filter(i => i.id != id);
                saveCart(cart);
            }
        }

        function renderCart() {
            const cart = getCart();
            const container = document.getElementById('cart-content');

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="fa-solid fa-cart-flatbed"></i>
                        <h2>Giỏ hàng của bạn đang trống</h2>
                        <p>Hãy chọn thêm sản phẩm để tiếp tục mua sắm nhé!</p>
                        <a href="/" class="btn-home">Về trang chủ</a>
                    </div>`;
                return;
            }

            let total = 0;
            let totalQty = 0;
            let productHtml = cart.map(item => {
                const subtotal = item.price * item.quantity;
                total += subtotal;
                totalQty += item.quantity;
                return `
                    <div class="product-item">
                        <img src="${item.image}" class="product-img" alt="${item.name}">
                        <div class="product-detail">
                            <h3 class="product-name">${item.name}</h3>
                            <span class="product-variant">Màu: Ngẫu nhiên</span>
                            <div class="promo-tag">
                                Nhập mã VNPAY0126 giảm tối đa 100.000đ khi thanh toán qua VNPAY-QR <a href="#">(Xem chi tiết)</a>
                            </div>
                            <div class="cart-actions">
                                <span class="btn-remove" onclick="removeItem(${item.id})">Xoá</span>
                                <div class="quantity-control">
                                    <button onclick="updateQuantity(${item.id}, -1)">-</button>
                                    <span>${item.quantity}</span>
                                    <button onclick="updateQuantity(${item.id}, 1)">+</button>
                                </div>
                            </div>
                        </div>
                        <div class="price-group">
                            <span class="price-current">${formatCurrency(item.price)}</span>
                            ${item.oldPrice ? `<span class="price-old">${formatCurrency(item.oldPrice)}</span>` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = `
                <!-- Tabs -->
                <div class="delivery-tabs">
                    <div class="tab active"><i class="fa-solid fa-truck-fast"></i> Giao tận nơi</div>
                    <div class="tab"><i class="fa-solid fa-shop"></i> Nhận tại siêu thị</div>
                </div>

                <!-- Customer Info -->
                <div class="section-box">
                    <div class="customer-info">
                        <div>
                            <span class="title">Người nhận: Anh Ngô Gia Phương</span>
                            <span class="sub-title">Vui lòng cung cấp thông tin nhận hàng</span>
                        </div>
                        <i class="fa-solid fa-chevron-right" style="color:#ccc"></i>
                    </div>
                </div>

                <!-- Products -->
                <div class="section-box">
                    ${productHtml}
                    <div class="summary-row" style="margin-top:20px">
                        <span>Tạm tính (${totalQty} sản phẩm):</span>
                        <span style="font-weight:bold">${formatCurrency(total)}</span>
                    </div>
                </div>

                <!-- Special Requests -->
                <div class="section-box">
                    <h4 class="section-title">Yêu cầu đặc biệt</h4>
                    <div class="option-item">
                        <input type="checkbox" id="hd"> <label for="hd">Hướng dẫn sử dụng, giải đáp thắc mắc</label>
                    </div>
                    <div class="option-item">
                        <input type="checkbox" id="hdct"> <label for="hdct">Xuất hóa đơn công ty</label>
                    </div>
                    <div class="option-item">
                        <input type="checkbox" id="yck"> <label for="yck">Yêu cầu khác</label>
                    </div>
                </div>

                <!-- Rewards & Total -->
                <div class="section-box">
                    <div class="discount-selector" style="display:flex; justify-content:space-between; color:var(--primary-blue); margin-bottom:15px; font-size:14px; cursor:pointer;">
                        <span><i class="fa-solid fa-ticket"></i> Chọn hoặc nhập mã giảm</span>
                        <i class="fa-solid fa-chevron-right"></i>
                    </div>
                    <div class="switch-container">
                        <span style="font-size:14px"><i class="fa-solid fa-medal" style="color:#ffd400"></i> Dùng điểm Quà Tặng VIP</span>
                        <label class="switch">
                            <input type="checkbox">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="total-row summary-row">
                        <span>Tổng tiền</span>
                        <span style="color:#d0021b; font-size:19px">${formatCurrency(total)}</span>
                    </div>
                </div>

                <!-- Payment Methods -->
                <div class="section-box" style="border-bottom:none; padding-bottom:40px;">
                    <h4 class="section-title">Hình thức thanh toán</h4>
                    <div class="payment-item">
                        <input type="radio" name="payment" id="pay1" checked>
                        <div class="payment-info">
                            <label for="pay1"><i class="fa-solid fa-wallet" style="color:#d82d8b"></i> Qua ví điện tử MoMo</label>
                            <p>(Quét mã QR, an toàn, tiện lợi)</p>
                        </div>
                    </div>
                    <div class="payment-item">
                        <input type="radio" name="payment" id="pay2">
                        <div class="payment-info">
                            <label for="pay2"><i class="fa-solid fa-building-columns" style="color:var(--primary-blue)"></i> Chuyển khoản ngân hàng</label>
                        </div>
                    </div>
                    <div class="payment-item">
                        <input type="radio" name="payment" id="pay3">
                        <div class="payment-info">
                            <label for="pay3"><i class="fa-solid fa-hand-holding-dollar" style="color:#4caf50"></i> Thanh toán khi nhận hàng (COD)</label>
                        </div>
                    </div>

                    <div style="margin-top:25px; font-size:13px; color:#666; display:flex; align-items:flex-start;">
                        <input type="checkbox" checked style="margin-right:8px; margin-top:2px">
                        <span>Tôi đồng ý với <a href="#" style="color:var(--primary-blue); text-decoration:none">Chính sách xử lý dữ liệu cá nhân</a> của Thế Giới Di Động</span>
                    </div>
                </div>

                <!-- Fixed Footer -->
                <div class="bottom-bar">
                    <button class="btn-submit" onclick="submitOrder()">Đặt hàng</button>
                    <p style="text-align:center; font-size:11px; color:#999;">Bạn có thể chọn hình thức thanh toán ở bước tiếp theo</p>
                </div>
            `;
        }

        function submitOrder() {
            const cart = getCart();
            if (cart.length === 0) return;

            let momoSelected = document.getElementById('pay1').checked;
            let total = cart.reduce((acc, item) => acc + item.price * item.quantity, 0);

            if (momoSelected) {
                let form = document.createElement("form");
                form.method = "POST";
                form.action = "/momo/create";

                let amountInput = document.createElement("input");
                amountInput.type = "hidden";
                amountInput.name = "amount";
                amountInput.value = total;
                form.appendChild(amountInput);

                let infoInput = document.createElement("input");
                infoInput.type = "hidden";
                infoInput.name = "orderInfo";
                infoInput.value = "Thanh toán đơn hàng Giỏ hàng TGDĐ";
                form.appendChild(infoInput);

                let nameInput = document.createElement("input");
                nameInput.type = "hidden";
                nameInput.name = "customerName";
                nameInput.value = "Anh Ngô Gia Phương";
                form.appendChild(nameInput);

                cart.forEach(item => {
                    let productInput = document.createElement("input");
                    productInput.type = "hidden";
                    productInput.name = "productIds";
                    productInput.value = item.id;
                    form.appendChild(productInput);
                });

                document.body.appendChild(form);
                form.submit();
                localStorage.removeItem(CART_KEY);
                return;
            }

            alert('Đoàn kết là sức mạnh! Đơn hàng của bạn đang được khởi tạo...');
            // In real app, send to server here
            localStorage.removeItem(CART_KEY);
            window.location.href = '/';
        }

        // Initial render
        renderCart();
    </script>
</body>

</html>
