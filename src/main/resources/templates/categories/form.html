<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${category.id != null ? 'Chỉnh sửa danh mục' : 'Thêm danh mục mới'}">Form danh mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); min-height: 100vh; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .navbar { background: rgba(255,255,255,0.95) !important; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
        .form-control:focus { border-color: #11998e; box-shadow: 0 0 0 0.2rem rgba(17, 153, 142, 0.25); }
        .btn-primary { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); border: none; }
        .btn-primary:hover { background: linear-gradient(135deg, #0e8377 0%, #2fd56e 100%); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="/"><i class="bi bi-shop"></i> WebBanHang</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" th:href="@{/products}"><i class="bi bi-box-seam"></i> Sản phẩm</a>
                <a class="nav-link" th:href="@{/categories}"><i class="bi bi-tags"></i> Danh mục</a>
                <a class="nav-link" th:href="@{/orders}"><i class="bi bi-cart3"></i> Đơn hàng</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card">
                    <div class="card-header bg-white border-0 pt-4">
                        <h4 class="mb-0 text-center">
                            <i class="bi bi-tags text-success"></i>
                            <span th:text="${category.id != null ? 'Chỉnh sửa danh mục' : 'Thêm danh mục mới'}"></span>
                        </h4>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/categories/save}" th:object="${category}" method="post">
                            <input type="hidden" th:field="*{id}">
                            
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Tên danh mục</label>
                                <input type="text" class="form-control form-control-lg" th:field="*{name}" 
                                       placeholder="Nhập tên danh mục" required>
                                <div th:if="${#fields.hasErrors('name')}" class="text-danger mt-1">
                                    <small th:errors="*{name}"></small>
                                </div>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="bi bi-check-circle"></i> Lưu danh mục
                                </button>
                                <a th:href="@{/categories}" class="btn btn-outline-secondary">
                                    <i class="bi bi-arrow-left"></i> Quay lại
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
